spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mad}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:dummy}
    openai:
      api-key: ${OPENAI_API_KEY:dummy}

llm:
  models:
    - id: claude-opus-4-7
      name: Claude Opus 4.7
      provider: ANTHROPIC
    - id: claude-sonnet-4-6
      name: Claude Sonnet 4.6
      provider: ANTHROPIC
    - id: claude-haiku-4-5
      name: Claude Haiku 4.5
      provider: ANTHROPIC
    - id: gpt-5
      name: GPT-5
      provider: OPENAI
    - id: gpt-5-mini
      name: GPT-5 mini
      provider: OPENAI