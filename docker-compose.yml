services:
  postgres:
    image: postgres:17-alpine
    container_name: mad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mad"]
      interval: 5s
      timeout: 5s
      retries: 10

  mermaid-validator:
    build:
      context: ./mermaid-validator
    container_name: mad-mermaid-validator
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: mad-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mermaid-validator:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mad
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MERMAID_VALIDATOR_URL: http://mermaid-validator:3000
    configs:
      - source: backend_app_config
        target: /app/config/application.yml
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: mad-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:4200"

configs:
  backend_app_config:
    content: |
      generation:
        mermaid-repair-max-attempts: 3
        concurrency: 1
        max-adrs: 8
        max-flows: 6
      llm:
        models:
          - id: claude-opus-4-8
            name: Claude Opus 4.8
            provider: ANTHROPIC
          - id: claude-sonnet-4-6
            name: Claude Sonnet 4.6
            provider: ANTHROPIC
          - id: claude-haiku-4-5
            name: Claude Haiku 4.5
            provider: ANTHROPIC
          - id: gpt-5
            name: GPT-5
            provider: OPENAI
          - id: gpt-5.4-mini
            name: GPT-5.4 Mini
            provider: OPENAI

volumes:
  postgres-data:
