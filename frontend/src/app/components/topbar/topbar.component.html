<header class="h-13 flex items-center gap-2.5 shrink-0 pl-3.5 pr-[18px] border-b border-border bg-surface relative z-30">
  <a
    class="flex items-center gap-[9px] py-1 pl-1 pr-2 rounded-[7px] cursor-pointer transition-colors duration-150 ease-out no-underline text-inherit hover:bg-surface-muted"
    [routerLink]="['/']"
    aria-label="Home"
  >
    <span class="w-[26px] h-[26px] rounded-[7px] bg-text text-white grid place-items-center relative shrink-0">
      <app-icon name="logo" [size]="18" />
    </span>
    <span class="text-body font-semibold tracking-[-0.01em]">MAD</span>
  </a>
  <span class="flex-1"></span>
</header>
